# Local Supabase config — used by `npx supabase start`.
# See https://supabase.com/docs/guides/cli/config for the full reference.

project_id = "golf-charity-platform"

[api]
enabled = true
port = 54321
schemas = ["public", "storage", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[studio]
enabled = true
port = 54323
api_url = "http://127.0.0.1"

[auth]
enabled = true
site_url = "http://localhost:3000"
additional_redirect_urls = ["http://localhost:3000/auth/callback"]
jwt_expiry = 3600
enable_signup = true

[auth.email]
enable_signup = true
double_confirm_changes = true
enable_confirmations = false   # local dev only — turn ON in production
secure_password_change = false

[storage]
enabled = true
file_size_limit = "10MiB"

[[storage.buckets]]
name = "charity-images"
public = true

[[storage.buckets]]
name = "winner-proofs"
public = false

[[storage.buckets]]
name = "user-avatars"
public = true
